ffw_robot_manager:
  disable_torque_on_error: {
    type: bool,
    default_value: true,
    description: "Whether to disable Dynamixel torque when hardware errors are detected. If true, torque will be disabled for all Dynamixels when any error is detected. If false, torque will remain enabled even when errors occur."
  }
  set_led_error_on_error: {
    type: bool,
    default_value: true,
    description: "Whether to set LED to red color when hardware errors are detected. If true, LED will be set to red blinking mode when any error is detected. If false, LED will remain unchanged."
  }
  ffw_type: {
    type: string,
    default_value: "",
    description: "FFW robot type (e.g., 'ffw_sg2_rev1'). Used to determine battery monitoring configuration."
  }
  enable_battery_soc_led: {
    type: bool,
    default_value: true,
    description: "Enable LED indication based on battery SOC when there is no error/watchdog alarm."
  }
  battery_soc_high_threshold: {
    type: double,
    default_value: 0.50,
    description: "SOC threshold for HIGH battery LED level (0.0~1.0). Must be greater than medium threshold."
  }
  battery_soc_medium_threshold: {
    type: double,
    default_value: 0.30,
    description: "SOC threshold for MEDIUM battery LED level (0.0~1.0). Must be between high and low thresholds."
  }
  battery_soc_low_threshold: {
    type: double,
    default_value: 0.15,
    description: "SOC threshold for LOW battery LED level (0.0~1.0). Below this is CRITICAL."
  }
  battery_soc_led_hysteresis: {
    type: double,
    default_value: 0.03,
    description: "Hysteresis margin for SOC LED transitions to reduce flicker near thresholds."
  }

# config/zedm_yaml
# Parameters for Stereolabs ZED mini camera
# Optimized for stable 15 FPS with minimal processing overhead
---
/**:
    ros__parameters:
        general:
            camera_model: 'zedm'
            camera_name: 'zedm' # overwritten by launch file
            grab_resolution: 'HD720' # The native camera grab resolution. 'HD2K', 'HD1080', 'HD720', 'VGA', 'AUTO'
            grab_frame_rate: 15 # ZED SDK internal grabbing rate
            pub_frame_rate: 15.0 # Must match grab_frame_rate to avoid jitter!

        depth:
            depth_mode: 'NONE' # Disable depth processing (not needed, reduces CPU load)
            min_depth: 0.1 # Min: 0.1, Max: 3.0
            max_depth: 10.0 # Max: 20.0

        sensors:
            publish_imu_tf: false # Disable IMU TF (not needed)
            sensors_image_sync: false # Disable sensor sync (reduces overhead)

        pos_tracking:
            pos_tracking_enabled: false # Disable positional tracking

        mapping:
            mapping_enabled: false # Disable mapping

        object_detection:
            od_enabled: false # Disable object detection

        body_tracking:
            bt_enabled: false # Disable body tracking

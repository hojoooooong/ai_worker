/**:
  lidar_cluster:
    ros__parameters:
      # Frame parameters
      fixed_frame: "base_link"
      
      # Clustering parameters
      cluster_dist_euclid: 0.05
      min_points_per_cluster: 3
      max_detect_distance: 2.0
      
      # QoS parameters
      qos_depth: 1

  v_marker_localization:
    ros__parameters:
      # Frame parameters
      frame_id: "odom"

      # Detection range [m]
      detection_range: 2.0

      # Relative angle filter range [deg] (bearing angle min/max from robot front)
      angle_min_deg: -180.0
      angle_max_deg: 180.0

      # IEPF split threshold [m] - max perpendicular distance to trigger split
      # V-marker with 10cm segments at 45deg: vertex depth ~7cm, use ~2cm threshold
      split_threshold: 0.02

      # Stitch filter: max Euclidean distance to merge scan-boundary clusters [m]
      stitch_euclidian_dist: 0.04

      # Outer L segment parallel check [deg]
      # Smaller value = tighter filtering (recommended 12~20)
      outer_parallel_max_angle_deg: 10.0

      # Per-segment size tolerance ratio (0.10 => +/-10%)
      seg_size_margin_ratio: 0.30

      # V directionality check: true = V apex must face outward from robot
      inner_v_must_face_outward: true

      # Offset from intersection point to dock pose [m]
      x_offset: 0.0
      y_offset: 0.0

      # L-V-V-L marker segment sizes [m]
      mark_size_lvl_0: 0.14    # Left L marker size
      mark_size_lvl_1: 0.1   # Center-left V marker size
      mark_size_lvl_2: 0.1   # Center-right V marker size
      mark_size_lvl_3: 0.14    # Right L marker size
      mark_size_lvl_3: 0.14    # Right L marker size

      # Noise filter thresholds
      noise_xy_threshold: 0.5       # Max position change per update [m]
      noise_theta_threshold: 0.5  # Max angle change per update [rad] (~10 deg)
      filter_log_period_sec: 5.0
      warn_log_throttle_ms: 5000

      # Initial pose stabilizer (before first dock_pose publish)
      initial_pose_sample_count: 10
      initial_pose_min_inliers: 6
      initial_pose_max_xy_dev: 0.08       # [m]
      initial_pose_max_yaw_dev_deg: 15.0  # [deg]

      # EMA smoothing factor (0.0=freeze, 1.0=no smoothing, 0.3=recommended)
      ema_alpha: 0.25

      # First-detection ROI lock:
      # Once first dock_pose is detected, lock a global tracking circle (goal-pose centered)
      # and ignore clusters outside.
      enable_first_detection_roi_lock: true
      first_detection_roi_radius: 0.4   # [m]

      # QoS parameters
      qos_depth: 1

  holonomic_drive_controller:
    ros__parameters:
      # Linear PD control gains
      Kp_linear: 1.0
      Kd_linear: 0.3

      # Angular PD control gains
      Kp_angular: 1.5
      Kd_angular: 0.5

      # Linear velocity limits [m/s]
      max_linear_velocity: 0.3
      min_linear_velocity: 0.07

      # Angular velocity limits [rad/s]
      max_angular_velocity: 0.6
      min_angular_velocity: 0.1

      # Goal tolerances
      position_tolerance: 0.02    # [m] distance to consider position reached
      orientation_tolerance: 0.03 # [rad] yaw error to consider orientation reached

      # Message type selection
      use_twist_stamped: false  # true: TwistStamped, false: Twist

      # Path visualization frame
      path_frame_id: "odom"     # frame_id for planned/actual path messages

      # Collision stop (scan-based rectangular ring in base_link)
      enable_collision_stop: false
      collision_outer_front_x: 0.27
      collision_outer_back_x: 0.40
      collision_outer_half_y: 0.35
      collision_inner_front_x: 0.1
      collision_inner_back_x: 0.30
      collision_inner_half_y: 0.15
      collision_min_points: 5
      collision_range_min: 0.05
      collision_range_max: 0.60
      collision_frame: "base_link"
      collision_marker_topic: "/holonomic_drive/collision_zone"

  marker_ab_goal_router:
    ros__parameters:
      # IO topics/services
      dock_pose_topic: "/dock_pose"
      odom_topic: "/odom"
      goal_pose_topic: "/goal_pose"
      goal_pose_viz_topic: "/goal_pose_rviz"
      goal_publish_rate_hz: 10.0
      current_pose_marker_topic: "/current_pose_marker"
      current_pose_publish_rate_hz: 10.0
      move_service_name: "/marker_ab_move"  # SetBool(true=A, false=B)
      move_add_two_ints_service_name: "/move_ab_move"  # AddTwoInts(a=1|2|3, b=0)
      drive_finish_service_name: "/drive_finish"
      v_marker_roi_lock_reset_service_name: "/v_marker_roi_lock_reset"

      # Output pose frame for goal_pose
      frame_id: "odom"

      # Safety / behavior
      # Set goal_pose_topic to "/goal_pose_rviz" for visualization-only
      # or "/goal_pose" for actual drive input.
      # goal_pose_viz_topic is always published for RViz checking.
      enable_goal_freeze: true
      goal_freeze_distance: 0.2
      yaw_republish_distance: 0.02
      dock_pose_timeout_sec: 1.0
      odom_timeout_sec: 1.0

      # Marker-relative target A (x[m], y[m], yaw[rad])
      a_x: -1.09
      a_y: -0.194
      a_yaw: -1.57

      # Marker-relative target B (x[m], y[m], yaw[rad])
      b_x: -0.478
      b_y: 0.073
      b_yaw: 0.007

      # Marker-relative target C (x[m], y[m], yaw[rad])
      c_x: -0.466
      c_y: 0.477
      c_yaw: 0.0
